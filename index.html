<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Personal Website</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f8f9fa;
                color: #333;
                line-height: 1.6;
            }
            nav {
                background-color: #2c3e50;
                color: white;
                padding: 1rem 2rem;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            nav .container {
                max-width: 1000px;
                margin: 0 auto;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            nav h1 {
                font-size: 1.5rem;
                font-weight: 300;
            }
            nav a {
                color: white;
                text-decoration: none;
                padding: 0.5rem 1rem;
                border-radius: 5px;
                transition: background-color 0.3s ease;
            }
            nav a:hover {
                background-color: rgba(255, 255, 255, 0.1);
            }
            .hero {
                max-width: 1000px;
                margin: 4rem auto;
                padding: 2rem;
                text-align: center;
                background-color: white;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }
            h1 {
                font-size: 2.5rem;
                color: #899499;
                margin-bottom: 1rem;
                font-style: normal;
            }
            h4 {
                font-size: 1.2rem;
                color: #36454F;
                margin: 1.5rem 0;
            }
            h6 {
                font-size: 1rem;
                font-style: italic;
                color: #A9A9A9;
                margin: 1rem 0;
            }
            .profile-img {
                width: 150px;
                height: 150px;
                border-radius: 50%;
                margin: 2rem auto;
                border: 4px solid #3498db;
                display: block;
            }
            .cta-button {
                display: inline-block;
                background-color: #3498db;
                color: white;
                padding: 12px 24px;
                text-decoration: none;
                border-radius: 25px;
                font-weight: 600;
                margin-top: 2rem;
                transition: background-color 0.3s ease;
            }
            .cta-button:hover {
                background-color: #2980b9;
                color: white;
                text-decoration: none;
            }
            @media (max-width: 768px) {
                .hero {
                    margin: 2rem 1rem;
                    padding: 1.5rem;
                }
                h1 {
                    font-size: 2rem;
                }
                nav .container {
                    flex-direction: column;
                    gap: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="container">
                <h1>My Personal Website</h1>
                <a href="aboutme.html">About Me</a>
            </div>
        </nav>
        <div class="hero">
            <div>
                <h6>Hi, Welcome to My Personal Website! Enjoy. :)</h6>
                <h1>My Personal Website</h1>
                <h4>My name is Janiesha Justine Conise, I'm from INF242 currently taking a Bachelor of Science in Information Technology - Multimedia Arts and Animation</h4>
                <img src="1x1 ko.png" alt="Janiesha Justine Conise" class="profile-img">
                <a href="aboutme.html" class="cta-button">Get to Know Me</a>
            </div>
        </div>
    </body>
</html>
